<!DOCTYPE html>
<html>
<head>
  <title>Student Management</title>
</head>
<body>
  <h2>Student Form</h2>

  <form id="studentForm">
    <input type="text" placeholder="Name" id="name" required><br><br>
    <input type="email" placeholder="Email" id="email" required><br><br>
    <input type="text" placeholder="Tech Field" id="tech" required><br><br>
    <input type="text" placeholder="Location" id="location" required><br><br>

    <button type="submit">Submit</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
